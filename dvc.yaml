# dvc.yaml
stages:
  preprocess:
    cmd: python src/preprocess.py
    deps:
      - src/preprocess.py
      - data/raw/churn.csv
    params:
      - preprocess
    outs:
      - data/processed/X_train.csv
      - data/processed/X_test.csv
      - data/processed/y_train.csv
      - data/processed/y_test.csv
      - data/processed/scaler.pkl
      - data/processed/label_encoders.pkl
      - data/processed/feature_names.pkl

  train:
    cmd: python src/train.py
    deps:
      - src/train.py
      - data/processed/X_train.csv
      - data/processed/y_train.csv
    params:
      - train
      - mlflow
    outs:
      - models/model.pkl
      - models/run_id.txt

  evaluate:
    cmd: python src/evaluate.py
    deps:
      - src/evaluate.py
      - data/processed/X_test.csv
      - data/processed/y_test.csv
      - models/model.pkl
      - models/run_id.txt
    params:
      - mlflow
      - evaluate
    outs:
      - models/metrics.json

  register:
    cmd: python src/register.py
    deps:
      - src/register.py
      - models/metrics.json
      - models/run_id.txt
    params:
      - mlflow
      - evaluate
